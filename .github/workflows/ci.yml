name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o llmirror ./cmd/llmirror

  peer-sync:
    name: Peer sync integration
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Build llmirror
        run: go build -o llmirror ./cmd/llmirror

      - name: Peer A → Peer B sync
        env:
          LLMIRROR: ${{ github.workspace }}/llmirror
          LLMIRROR_TEST_MODEL: hf-internal-testing/tiny-random-gpt2
          LLMIRROR_TEST_REVISION: main
          LLMIRROR_PORT_A: "17947"
        run: |
          chmod +x scripts/ci-peer-sync.sh
          scripts/ci-peer-sync.sh
