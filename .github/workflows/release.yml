name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
          - name: darwin-arm64
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/llmirror-${{ matrix.name }}" ./cmd/llmirror

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/llmirror-${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
